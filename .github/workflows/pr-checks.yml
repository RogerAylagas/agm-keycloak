name: PR Validation

on:
  pull_request:
    branches: [main, develop]

jobs:
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.14.0'

      - name: Lint Helm chart (local values)
        run: helm lint deploy/helm/agm-keycloak -f deploy/helm/agm-keycloak/values.yaml -f deploy/helm/agm-keycloak/values-local.yaml

      - name: Template validation (dry-run)
        run: helm template agm-keycloak deploy/helm/agm-keycloak \
          -f deploy/helm/agm-keycloak/values.yaml \
          -f deploy/helm/agm-keycloak/values-local.yaml \
          --debug > /tmp/rendered.yaml && wc -l /tmp/rendered.yaml

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Keycloak image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Nginx image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/nginx/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
