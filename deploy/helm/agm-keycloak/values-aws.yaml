cloud:
  provider: aws

keycloak:
  hostname: auth.example.com
  replicas: 2
  resources:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

database:
  provider: rds
  host: ""
  postgresql:
    enabled: false

ingress:
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: ""

nginx:
  enabled: false

secrets:
  existingSecret: agm-keycloak-secrets

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: ""

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilization: 70
