apiVersion: v1
kind: Service
metadata:
  name: {{ include "agm-keycloak.fullname" . }}
  labels:
    {{- include "agm-keycloak.labels" . }}
    component: keycloak
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  - port: {{ .Values.keycloak.health.port }}
    targetPort: management
    protocol: TCP
    name: management
  selector:
    {{- include "agm-keycloak.selectorLabels" . }}
    component: keycloak
