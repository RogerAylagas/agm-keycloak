apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agm-keycloak.fullname" . }}
  labels:
    {{- include "agm-keycloak.labels" . }}
    component: keycloak
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.keycloak.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "agm-keycloak.selectorLabels" . }}
      component: keycloak
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/keycloak/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "agm-keycloak.selectorLabels" . }}
        component: keycloak
    spec:
      serviceAccountName: {{ include "agm-keycloak.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: keycloak
        image: {{ include "agm-keycloak.image" . }}
        imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
        command:
          - /opt/keycloak/bin/kc.sh
        args:
          - start
          {{- if .Values.keycloak.importRealm }}
          - --import-realm
          {{- end }}
          - --optimized
        ports:
        - name: http
          containerPort: {{ .Values.keycloak.http.port }}
          protocol: TCP
        - name: management
          containerPort: {{ .Values.keycloak.health.port }}
          protocol: TCP
        env:
        - name: KC_DB
          value: postgres
        - name: KC_DB_URL
          value: "jdbc:postgresql://{{ include "agm-keycloak.db.host" . }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
        - name: KC_DB_USERNAME
          value: {{ .Values.database.user }}
        - name: KC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.existingSecret | default (include "agm-keycloak.fullname" .) }}
              key: {{ .Values.secrets.dbPasswordKey }}
        - name: KC_HOSTNAME
          value: {{ required "keycloak.hostname is required" .Values.keycloak.hostname }}
        - name: KC_HOSTNAME_STRICT
          value: "false"
        - name: KC_HOSTNAME_STRICT_HTTPS
          value: "false"
        - name: KC_HTTP_ENABLED
          value: "{{ .Values.keycloak.http.enabled }}"
        - name: KC_PROXY_HEADERS
          value: {{ .Values.keycloak.proxyHeaders }}
        - name: KC_FEATURES
          value: {{ .Values.keycloak.features }}
        - name: KEYCLOAK_ADMIN
          value: {{ .Values.keycloak.adminUser }}
        - name: KEYCLOAK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.existingSecret | default (include "agm-keycloak.fullname" .) }}
              key: {{ .Values.secrets.adminPasswordKey }}
        {{- with .Values.keycloak.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /health/live
            port: management
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health/ready
            port: management
          initialDelaySeconds: 30
          periodSeconds: 10
        startupProbe:
          httpGet:
            path: /health/started
            port: management
          failureThreshold: 30
          periodSeconds: 10
        resources:
          {{- toYaml .Values.keycloak.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      {{- if eq .Values.database.provider "local" }}
      initContainers:
      - name: wait-for-db
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z agm-keycloak-postgres 5432; do echo waiting for db; sleep 2; done']
      {{- end }}
