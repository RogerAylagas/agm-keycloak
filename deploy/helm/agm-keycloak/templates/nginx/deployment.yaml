{{- if .Values.nginx.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agm-keycloak.fullname" . }}-nginx
  labels:
    {{- include "agm-keycloak.labels" . }}
    component: nginx
spec:
  replicas: {{ .Values.nginx.replicas }}
  selector:
    matchLabels:
      {{- include "agm-keycloak.selectorLabels" . }}
      component: nginx
  template:
    metadata:
      labels:
        {{- include "agm-keycloak.selectorLabels" . }}
        component: nginx
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
      - name: nginx
        image: {{ include "agm-keycloak.nginx.image" . }}
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        - name: https
          containerPort: 443
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.nginx.resources | nindent 10 }}
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true
        {{- if .Values.nginx.tls.enabled }}
        - name: tls-certs
          mountPath: /etc/nginx/certs
          readOnly: true
        {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
            add:
            - NET_BIND_SERVICE
      volumes:
      - name: nginx-config
        configMap:
          name: {{ include "agm-keycloak.fullname" . }}-nginx-config
      {{- if .Values.nginx.tls.enabled }}
      - name: tls-certs
        secret:
          secretName: {{ .Values.nginx.tls.secretName }}
      {{- end }}
{{- end }}
