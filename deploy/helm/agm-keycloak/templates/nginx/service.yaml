{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agm-keycloak.fullname" . }}-nginx
  labels:
    {{- include "agm-keycloak.labels" . }}
    component: nginx
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  - port: 443
    targetPort: https
    protocol: TCP
    name: https
  selector:
    {{- include "agm-keycloak.selectorLabels" . }}
    component: nginx
{{- end }}
